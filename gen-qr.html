<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>二维码</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F5F5F7;flex-direction:column;font-family:sans-serif;">
<h2 style="margin-bottom:20px;color:#1D1D1F;">五金配件目录</h2>
<div id="qr"></div>
<p style="margin-top:16px;color:#8E8E93;font-size:13px;">http://10.10.13.13:3000</p>
<script>
QRCode.toCanvas(document.createElement('canvas'), 'http://10.10.13.13:3000', {
  width: 280, margin: 2, color: {dark:'#1D1D1F',light:'#FFF'}
}, function(err, canvas) {
  if (err) { document.getElementById('qr').textContent = err.message; return; }
  document.getElementById('qr').appendChild(canvas);
});
</script>
</body>
</html>
