<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>扫码访问</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F5F5F7;flex-direction:column;font-family:-apple-system,sans-serif;margin:0;">
  <h2 style="margin-bottom:8px;color:#1D1D1F;font-weight:600;">五金配件目录</h2>
  <p style="margin-bottom:24px;color:#8E8E93;font-size:14px;">手机扫码直接浏览</p>
  <div id="qr"></div>
  <p style="margin-top:16px;color:#AEAEB2;font-size:12px;">https://idontkonwwhy.github.io/scan-mini-app/</p>
  <script>
    QRCode.toCanvas(document.getElementById('qr'), 'https://idontkonwwhy.github.io/scan-mini-app/', {
      width: 260, margin: 2, color: { dark:'#1D1D1F', light:'#FFF' }
    });
  </script>
</body>
</html>
